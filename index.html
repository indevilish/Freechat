<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeChat Pro</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface2: #222230;
            --primary: #6c5ce7;
            --primary-glow: #8b7cf0;
            --text: #e0e0e8;
            --text-secondary: #9898aa;
            --border: #2a2a3a;
            --msg-own: #6c5ce7;
            --msg-other: #2a2a3c;
            --success: #00c9a7;
            --danger: #ff6b6b;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .auth-screen, .chat-container { animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ---------- AUTH SCREEN ---------- */
        .auth-screen {
            background: var(--surface);
            border-radius: 20px;
            padding: 40px 30px;
            width: 400px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        .auth-screen .logo { font-size: 56px; margin-bottom: 8px; }
        .auth-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .auth-screen .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
        .auth-screen input {
            width: 100%; padding: 14px 18px; border-radius: var(--radius-sm);
            border: 2px solid var(--border); background: var(--surface2); color: var(--text);
            font-size: 16px; outline: none; text-align: center; margin-bottom: 12px;
            transition: var(--transition);
        }
        .auth-screen input:focus { border-color: var(--primary); }
        .auth-screen .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .auth-btn {
            flex: 1; padding: 14px; border-radius: var(--radius-sm);
            border: none; color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: var(--transition);
        }
        .btn-login { background: var(--primary); }
        .btn-register { background: var(--surface2); border: 2px solid var(--border); color: var(--text); }
        .btn-register:hover { border-color: var(--primary); }
        .auth-error { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }

        /* ---------- CHAT CONTAINER ---------- */
        .chat-container {
            display: flex; flex-direction: row; width: 100vw; height: 100vh;
            max-width: 1200px; max-height: 95vh; background: var(--surface);
            border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        @media (max-width: 700px) {
            .chat-container { max-width: 100vw; max-height: 100vh; border-radius: 0; flex-direction: column; }
        }
        .sidebar {
            width: 280px; background: var(--surface2); display: flex; flex-direction: column;
            border-right: 1px solid var(--border); flex-shrink: 0; overflow-y: auto;
        }
        @media (max-width: 700px) {
            .sidebar { width: 100%; flex-direction: row; align-items: center; border-right: none; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
        }
        .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
        .sidebar-section h4 { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .online-list, .chat-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        @media (max-width: 700px) {
            .online-list, .chat-list { flex-direction: row; gap: 6px; }
        }
        .online-list li, .chat-list li {
            padding: 10px 12px; border-radius: var(--radius-sm); display: flex;
            align-items: center; gap: 8px; font-size: 13px; cursor: pointer; transition: var(--transition);
        }
        .online-list li:hover, .chat-list li:hover { background: rgba(108,92,231,0.1); }
        .chat-list li.active { background: var(--primary); color: #fff; }
        .avatar {
            width: 34px; height: 34px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0;
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
        .search-box { width: 100%; padding: 10px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; outline: none; }
        .search-box:focus { border-color: var(--primary); }
        .main-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .btn-leave {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px;
        }
        .btn-leave:hover { background: rgba(255,107,107,0.15); border-color: var(--danger); color: var(--danger); }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg-wrapper { display: flex; gap: 10px; max-width: 75%; animation: msgIn 0.3s ease; }
        .msg-wrapper.own { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.own .msg-bubble { background: var(--msg-own); border-radius: 18px 18px 4px 18px; color:#fff; }
        .msg-wrapper.other .msg-bubble { background: var(--msg-other); border-radius: 18px 18px 18px 4px; }
        .msg-wrapper.system { align-self: center; max-width: 90%; }
        .msg-wrapper.system .msg-bubble { background: transparent; border: 1px dashed var(--border); color: var(--text-secondary); font-style: italic; font-size: 13px; border-radius: 20px; padding: 8px 16px; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; color:#fff; flex-shrink: 0; align-self: flex-end; }
        .msg-wrapper.own .msg-avatar { display: none; }
        .msg-sender { font-size: 11px; color: var(--text-secondary); font-weight: 600; padding:0 4px; }
        .msg-wrapper.own .msg-sender { text-align: right; color: #c4b8ff; }
        .msg-bubble { padding: 10px 16px; font-size: 15px; line-height: 1.45; word-break: break-word; }
        .msg-time { font-size: 10px; color: var(--text-secondary); padding:0 4px; opacity:0.8; }
        .typing-indicator { padding: 6px 20px; font-size: 12px; color: var(--text-secondary); font-style: italic; min-height: 24px; }
        .input-area { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap:10px; align-items: center; }
        .input-area input { flex:1; padding:12px 18px; border-radius:28px; border:2px solid var(--border); background:var(--surface2); color:var(--text); font-size:15px; outline:none; }
        .input-area input:focus { border-color: var(--primary); }
        .btn-send { width:46px; height:46px; border-radius:50%; border:none; background:var(--primary); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div class="auth-screen" id="authScreen">
        <div class="logo">💬</div>
        <h1>FreeChat Pro</h1>
        <p class="subtitle">Permanent account • Private messages</p>
        <input type="text" id="authUsername" placeholder="Username" maxlength="20" autocomplete="off">
        <input type="password" id="authPassword" placeholder="Password" maxlength="30">
        <div class="btn-group">
            <button class="auth-btn btn-login" id="btnLogin">Login</button>
            <button class="auth-btn btn-register" id="btnRegister">Register</button>
        </div>
        <p class="auth-error" id="authError"></p>
    </div>

    <!-- CHAT SCREEN -->
    <div class="chat-container" id="chatContainer" style="display:none;">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h4>🔍 Search User</h4>
                <input type="text" class="search-box" id="searchUserInput" placeholder="Username to message...">
            </div>
            <div class="sidebar-section">
                <h4>🌐 Online Now</h4>
                <ul class="online-list" id="onlineList"></ul>
            </div>
            <div class="sidebar-section">
                <h4>💬 Private Chats</h4>
                <ul class="chat-list" id="privateChatList"></ul>
            </div>
            <div class="sidebar-section" style="margin-top: auto;">
                <button class="btn-leave" id="btnLogout" style="width:100%;">Logout</button>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="main-chat">
            <div class="chat-header">
                <h3 id="chatTitle">🌐 Global Chat</h3>
                <button class="btn-leave" id="btnLeaveChat">Leave Private</button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
                <button class="btn-send" id="btnSend">➤</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        (function() {
            // ========== YOUR FIREBASE CONFIG ==========
            const firebaseConfig = {
                apiKey: "AIzaSyBgqz-yYPi1vLxuPpffkat44YhHhLe2Hsw",
                authDomain: "freechat-vishal.firebaseapp.com",
                databaseURL: "https://freechat-vishal-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "freechat-vishal",
                storageBucket: "freechat-vishal.firebasestorage.app",
                messagingSenderId: "40822804794",
                appId: "1:40822804794:web:ad1cb9046aa20b1a658003"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const auth = firebase.auth();

            // ========== DOM ELEMENTS ==========
            const authScreen = document.getElementById('authScreen');
            const chatContainer = document.getElementById('chatContainer');
            const authUsername = document.getElementById('authUsername');
            const authPassword = document.getElementById('authPassword');
            const btnLogin = document.getElementById('btnLogin');
            const btnRegister = document.getElementById('btnRegister');
            const authError = document.getElementById('authError');
            const onlineList = document.getElementById('onlineList');
            const privateChatList = document.getElementById('privateChatList');
            const messagesArea = document.getElementById('messagesArea');
            const typingIndicator = document.getElementById('typingIndicator');
            const messageInput = document.getElementById('messageInput');
            const btnSend = document.getElementById('btnSend');
            const btnLogout = document.getElementById('btnLogout');
            const chatTitle = document.getElementById('chatTitle');
            const btnLeaveChat = document.getElementById('btnLeaveChat');
            const searchUserInput = document.getElementById('searchUserInput');

            // ========== STATE ==========
            let myUsername = '';
            let currentChatId = 'global'; // 'global' or roomId
            let currentChatPartner = null; // for private chat
            let presenceRef = null;
            let typingRef = null;
            let unsubscribes = [];

            // ========== HELPER FUNCTIONS ==========
            async function sha256(message) {
                const msgBuffer = new TextEncoder().encode(message);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }

            function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }

            function clearMessages() { messagesArea.innerHTML = ''; }

            function renderMessage(data) {
                const { username, message, timestamp, uid } = data;
                const isOwn = (username === myUsername);
                const wrapper = document.createElement('div');
                wrapper.classList.add('msg-wrapper');
                if (username === 'SYSTEM') {
                    wrapper.classList.add('system');
                } else {
                    wrapper.classList.add(isOwn ? 'own' : 'other');
                }
                if (username === 'SYSTEM') {
                    const bubble = document.createElement('div');
                    bubble.classList.add('msg-bubble');
                    bubble.textContent = message;
                    wrapper.appendChild(bubble);
                } else {
                    const avatar = document.createElement('div');
                    avatar.classList.add('msg-avatar');
                    avatar.textContent = (username || '?').charAt(0).toUpperCase();
                    const content = document.createElement('div');
                    content.classList.add('msg-content');
                    const sender = document.createElement('span');
                    sender.classList.add('msg-sender');
                    sender.textContent = isOwn ? 'You' : username;
                    const bubble = document.createElement('div');
                    bubble.classList.add('msg-bubble');
                    bubble.textContent = message;
                    const time = document.createElement('span');
                    time.classList.add('msg-time');
                    time.textContent = formatTime(timestamp);
                    content.appendChild(sender);
                    content.appendChild(bubble);
                    content.appendChild(time);
                    wrapper.appendChild(avatar);
                    wrapper.appendChild(content);
                }
                messagesArea.appendChild(wrapper);
                scrollToBottom();
            }

            function renderOnlineUsers(usersObj) {
                onlineList.innerHTML = '';
                const users = Object.values(usersObj || {}).filter(u => u && u.username && u.username !== myUsername);
                if (users.length === 0) {
                    onlineList.innerHTML = '<li style="color:var(--text-secondary)">No one else online</li>';
                    return;
                }
                users.forEach(u => {
                    const li = document.createElement('li');
                    li.innerHTML = `<div class="avatar">${u.username.charAt(0).toUpperCase()}</div><span>${u.username}</span>`;
                    li.addEventListener('click', () => startPrivateChat(u.username));
                    onlineList.appendChild(li);
                });
            }

            function renderPrivateChats(chatMap) {
                privateChatList.innerHTML = '';
                if (!chatMap) return;
                Object.entries(chatMap).forEach(([roomId, data]) => {
                    const otherUser = data.partner;
                    const li = document.createElement('li');
                    li.className = currentChatId === roomId ? 'active' : '';
                    li.innerHTML = `<div class="avatar">${otherUser.charAt(0).toUpperCase()}</div><span>${otherUser}</span>`;
                    li.addEventListener('click', () => openPrivateChat(roomId, otherUser));
                    privateChatList.appendChild(li);
                });
            }

            // ========== FIREBASE LISTENERS ==========
            function attachGlobalListeners() {
                unsubscribes.forEach(fn => fn());
                unsubscribes = [];

                // Messages
                const msgRef = db.ref('globalMessages').limitToLast(200);
                const unsub1 = msgRef.on('child_added', snap => {
                    const msg = snap.val();
                    if (msg && currentChatId === 'global') renderMessage(msg);
                });
                unsubscribes.push(() => db.ref('globalMessages').off('child_added', unsub1));

                // Presence
                const presenceRefRoot = db.ref('presence');
                const unsub2 = presenceRefRoot.on('value', snap => renderOnlineUsers(snap.val()));
                unsubscribes.push(() => db.ref('presence').off('value', unsub2));

                // Typing
                const typingRoot = db.ref('typing');
                const unsub3 = typingRoot.on('value', snap => {
                    if (currentChatId !== 'global') return;
                    const typings = snap.val() || {};
                    for (let uid in typings) {
                        if (typings[uid] && typings[uid].username !== myUsername) {
                            typingIndicator.textContent = typings[uid].username + ' is typing...';
                            clearTimeout(window._typingClear);
                            window._typingClear = setTimeout(() => typingIndicator.textContent = '', 2000);
                            break;
                        }
                    }
                });
                unsubscribes.push(() => db.ref('typing').off('value', unsub3));

                // Private chat list
                const pvtRef = db.ref('userPrivateChats/' + myUsername);
                const unsub4 = pvtRef.on('value', snap => {
                    const data = snap.val() || {};
                    // Transform to {roomId: {partner, lastTime}}
                    const list = {};
                    Object.entries(data).forEach(([roomId, val]) => {
                        // roomId format: chat_user1_user2
                        const parts = roomId.replace('chat_', '').split('_');
                        const partner = parts.find(p => p !== myUsername);
                        if (partner) list[roomId] = { partner };
                    });
                    renderPrivateChats(list);
                });
                unsubscribes.push(() => db.ref('userPrivateChats/' + myUsername).off('value', unsub4));
            }

            function attachPrivateChatListeners(roomId) {
                unsubscribes.forEach(fn => fn());
                unsubscribes = [];

                const msgRef = db.ref('privateChats/' + roomId + '/messages').limitToLast(200);
                const unsub1 = msgRef.on('child_added', snap => {
                    const msg = snap.val();
                    if (msg && currentChatId === roomId) renderMessage(msg);
                });
                unsubscribes.push(() => db.ref('privateChats/' + roomId + '/messages').off('child_added', unsub1));

                // Typing for private
                const typingRef = db.ref('privateTyping/' + roomId);
                const unsub2 = typingRef.on('value', snap => {
                    const typings = snap.val() || {};
                    for (let uid in typings) {
                        if (typings[uid] && typings[uid].username !== myUsername) {
                            typingIndicator.textContent = typings[uid].username + ' is typing...';
                            clearTimeout(window._typingClear);
                            window._typingClear = setTimeout(() => typingIndicator.textContent = '', 2000);
                            break;
                        }
                    }
                });
                unsubscribes.push(() => db.ref('privateTyping/' + roomId).off('value', unsub2));
            }

            // ========== AUTH ==========
            async function login(username, password) {
                const userRef = db.ref('users/' + username);
                const snap = await userRef.once('value');
                if (!snap.exists()) throw new Error('Username not found. Register first.');
                const userData = snap.val();
                const hash = await sha256(password);
                if (hash !== userData.passwordHash) throw new Error('Incorrect password.');
                return true;
            }

            async function register(username, password) {
                const userRef = db.ref('users/' + username);
                const snap = await userRef.once('value');
                if (snap.exists()) throw new Error('Username already exists.');
                const hash = await sha256(password);
                await userRef.set({ passwordHash: hash, createdAt: firebase.database.ServerValue.TIMESTAMP });
                return true;
            }

            async function doAuth(isRegister) {
                const username = authUsername.value.trim();
                const password = authPassword.value.trim();
                authError.textContent = '';
                if (!username || !password) {
                    authError.textContent = 'Username and password required.';
                    return;
                }
                if (username.length < 2 || username.length > 20 || password.length < 4) {
                    authError.textContent = 'Username 2-20 chars, password min 4 chars.';
                    return;
                }
                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    authError.textContent = 'Only letters, numbers, underscores.';
                    return;
                }

                try {
                    // Sign in anonymously first (needed for write access)
                    await auth.signInAnonymously();
                } catch(e) { /* ignore if already signed */ }

                try {
                    if (isRegister) {
                        await register(username, password);
                    } else {
                        await login(username, password);
                    }
                    // Success
                    myUsername = username;
                    // Set presence
                    const uid = auth.currentUser.uid;
                    presenceRef = db.ref('presence/' + uid);
                    await presenceRef.set({ username: myUsername, onlineAt: firebase.database.ServerValue.TIMESTAMP });
                    presenceRef.onDisconnect().remove();

                    typingRef = db.ref('typing/' + uid);
                    typingRef.onDisconnect().remove();

                    // Add system message to global
                    db.ref('globalMessages').push({
                        username: 'SYSTEM',
                        message: `${myUsername} joined`,
                        timestamp: Date.now(),
                        uid: 'system'
                    });

                    // Switch UI
                    authScreen.style.display = 'none';
                    chatContainer.style.display = 'flex';
                    currentChatId = 'global';
                    chatTitle.textContent = '🌐 Global Chat';
                    btnLeaveChat.style.display = 'none';
                    clearMessages();
                    attachGlobalListeners();
                    messageInput.focus();
                } catch (err) {
                    authError.textContent = err.message;
                    auth.signOut(); // clean anonymous sign-in
                }
            }

            // ========== LOGOUT ==========
            async function logout() {
                if (presenceRef) presenceRef.remove();
                if (typingRef) typingRef.remove();
                unsubscribes.forEach(fn => fn());
                await auth.signOut();
                myUsername = '';
                currentChatId = 'global';
                authScreen.style.display = 'block';
                chatContainer.style.display = 'none';
                authUsername.value = '';
                authPassword.value = '';
                authError.textContent = '';
            }

            // ========== CHAT ACTIONS ==========
            function sendMessage() {
                const msg = messageInput.value.trim();
                if (!msg || !myUsername) return;
                const messageData = {
                    username: myUsername,
                    message: msg,
                    timestamp: Date.now()
                };
                if (currentChatId === 'global') {
                    db.ref('globalMessages').push(messageData);
                } else {
                    db.ref('privateChats/' + currentChatId + '/messages').push(messageData);
                    // Update last message time for both users
                    db.ref('userPrivateChats/' + myUsername + '/' + currentChatId).set(true);
                    db.ref('userPrivateChats/' + currentChatPartner + '/' + currentChatId).set(true);
                }
                messageInput.value = '';
                messageInput.focus();
            }

            function sendTypingStatus() {
                if (!myUsername) return;
                const uid = auth.currentUser?.uid;
                if (!uid) return;
                if (currentChatId === 'global') {
                    db.ref('typing/' + uid).set({ username: myUsername, timestamp: Date.now() });
                    clearTimeout(window._typingSend);
                    window._typingSend = setTimeout(() => db.ref('typing/' + uid).remove(), 1500);
                } else {
                    db.ref('privateTyping/' + currentChatId + '/' + uid).set({ username: myUsername, timestamp: Date.now() });
                    clearTimeout(window._typingSend);
                    window._typingSend = setTimeout(() => db.ref('privateTyping/' + currentChatId + '/' + uid).remove(), 1500);
                }
            }

            function openPrivateChat(roomId, partner) {
                currentChatId = roomId;
                currentChatPartner = partner;
                chatTitle.textContent = `💬 ${partner}`;
                btnLeaveChat.style.display = 'block';
                clearMessages();
                attachPrivateChatListeners(roomId);
                // Mark active in list
                renderPrivateChatsFromState();
            }

            function startPrivateChat(username) {
                const users = [myUsername, username].sort();
                const roomId = 'chat_' + users[0] + '_' + users[1];
                // Create chat node if not exists (participants)
                db.ref('privateChats/' + roomId + '/participants').set({
                    user1: users[0],
                    user2: users[1]
                });
                // Add to both user lists
                db.ref('userPrivateChats/' + myUsername + '/' + roomId).set(true);
                db.ref('userPrivateChats/' + username + '/' + roomId).set(true);
                openPrivateChat(roomId, username);
            }

            function renderPrivateChatsFromState() {
                // Re-render private chat list from current data (called after opening)
                db.ref('userPrivateChats/' + myUsername).once('value', snap => {
                    const data = snap.val() || {};
                    const list = {};
                    Object.entries(data).forEach(([roomId]) => {
                        const parts = roomId.replace('chat_', '').split('_');
                        const partner = parts.find(p => p !== myUsername);
                        if (partner) list[roomId] = { partner };
                    });
                    renderPrivateChats(list);
                });
            }

            function leavePrivateChat() {
                currentChatId = 'global';
                currentChatPartner = null;
                chatTitle.textContent = '🌐 Global Chat';
                btnLeaveChat.style.display = 'none';
                clearMessages();
                attachGlobalListeners();
                renderPrivateChatsFromState();
            }

            // ========== EVENT LISTENERS ==========
            btnLogin.addEventListener('click', () => doAuth(false));
            btnRegister.addEventListener('click', () => doAuth(true));
            authPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') doAuth(false); });

            btnSend.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
            messageInput.addEventListener('input', () => { if (messageInput.value.trim()) sendTypingStatus(); });

            btnLogout.addEventListener('click', logout);
            btnLeaveChat.addEventListener('click', leavePrivateChat);

            searchUserInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const username = searchUserInput.value.trim();
                    if (username && username !== myUsername) {
                        startPrivateChat(username);
                        searchUserInput.value = '';
                    }
                }
            });

            // Initial focus
            authUsername.focus();
        })();
    </script>
</body>
</html>
