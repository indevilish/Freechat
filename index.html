<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeChat Pro</title>
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface2: #222230;
      --primary: #6c5ce7;
      --primary-light: #8b7cf0;
      --text: #e0e0e8;
      --text-secondary: #9898aa;
      --border: #2a2a3a;
      --msg-own: #6c5ce7;
      --msg-other: #2a2a3c;
      --success: #00c9a7;
      --danger: #ff6b6b;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    /* Auth Screen */
    .auth-screen {
      background: var(--surface);
      border-radius: 24px;
      padding: 48px 36px;
      width: 420px;
      max-width: 92vw;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      animation: fadeInUp 0.4s ease;
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .auth-screen .logo { font-size: 56px; margin-bottom: 8px; }
    .auth-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .auth-screen .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
    .auth-screen input {
      width: 100%; padding: 14px 18px; border-radius: var(--radius-sm);
      border: 2px solid var(--border); background: var(--surface2); color: var(--text);
      font-size: 16px; outline: none; text-align: center; margin-bottom: 12px;
      transition: 0.25s;
    }
    .auth-screen input:focus { border-color: var(--primary); }
    .btn-group { display: flex; gap: 10px; margin-top: 8px; }
    .auth-btn {
      flex:1; padding: 14px; border-radius: var(--radius-sm);
      border:none; color:#fff; font-size:16px; font-weight:600; cursor:pointer;
      transition: 0.25s;
    }
    .btn-login { background: var(--primary); }
    .btn-login:hover { background: var(--primary-light); }
    .btn-register { background: var(--surface2); border:2px solid var(--border); color: var(--text); }
    .btn-register:hover { border-color: var(--primary); }
    .auth-error { color: var(--danger); font-size:13px; margin-top:12px; min-height:18px; }

    /* Chat Container */
    .chat-container {
      display: flex; width:100vw; height:100vh; max-width:1200px; max-height:95vh;
      background: var(--surface); border-radius:24px; overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.5); border:1px solid var(--border);
      animation: fadeInUp 0.4s ease;
    }
    @media (max-width:768px) {
      .chat-container { max-width:100vw; max-height:100vh; border-radius:0; flex-direction:column; }
    }

    /* Sidebar */
    .sidebar {
      width:280px; background:var(--surface2); display:flex; flex-direction:column;
      border-right:1px solid var(--border); flex-shrink:0; overflow-y:auto;
    }
    @media (max-width:768px) {
      .sidebar { width:100%; flex-direction:row; align-items:flex-start; border-right:none; border-bottom:1px solid var(--border); overflow-x:auto; }
    }
    .sidebar-section { padding:16px; border-bottom:1px solid var(--border); }
    .sidebar-section h4 {
      font-size:13px; color:var(--text-secondary); margin-bottom:12px;
      display:flex; align-items:center; gap:6px; text-transform:uppercase; letter-spacing:0.5px;
    }
    .online-list, .private-chat-list {
      list-style:none; display:flex; flex-direction:column; gap:6px;
    }
    .online-list li, .private-chat-list li {
      padding:10px 12px; border-radius:var(--radius-sm); display:flex;
      align-items:center; gap:8px; font-size:14px; background:rgba(255,255,255,0.03);
    }
    .private-chat-list li { cursor:pointer; transition:0.2s; }
    .private-chat-list li:hover { background:rgba(108,92,231,0.1); }
    .private-chat-list li.active { background:var(--primary); color:#fff; }
    .avatar {
      width:36px; height:36px; border-radius:50%; background:var(--primary);
      display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; flex-shrink:0;
    }
    .status-dot { width:8px; height:8px; border-radius:50%; background:var(--success); flex-shrink:0; }
    .search-box {
      width:100%; padding:10px 12px; border-radius:20px; border:1px solid var(--border);
      background:var(--surface); color:var(--text); font-size:14px; outline:none;
      margin-bottom:8px;
    }
    .search-box:focus { border-color:var(--primary); }
    .btn-search {
      width:100%; padding:8px; border-radius:20px; border:1px solid var(--border);
      background:var(--primary); color:#fff; font-size:14px; cursor:pointer; transition:0.2s;
    }
    .btn-search:hover { background:var(--primary-light); }

    /* Main Chat */
    .main-chat { flex:1; display:flex; flex-direction:column; min-width:0; }
    .chat-header {
      padding:16px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .chat-header h3 { font-size:17px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-leave {
      padding:8px 16px; border-radius:20px; border:1px solid var(--border);
      background:transparent; color:var(--text-secondary); cursor:pointer; font-size:13px; transition:0.2s;
    }
    .btn-leave:hover { background:rgba(255,107,107,0.15); border-color:var(--danger); color:var(--danger); }
    .messages-area { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; }
    .msg-wrapper { display:flex; gap:10px; max-width:78%; animation:msgIn 0.3s ease; }
    .msg-wrapper.own { align-self:flex-end; flex-direction:row-reverse; }
    .msg-wrapper.own .msg-bubble { background:var(--msg-own); border-radius:18px 18px 4px 18px; color:#fff; }
    .msg-wrapper.other .msg-bubble { background:var(--msg-other); border-radius:18px 18px 18px 4px; }
    .msg-wrapper.system { align-self:center; max-width:90%; }
    .msg-wrapper.system .msg-bubble { background:transparent; border:1px dashed var(--border); color:var(--text-secondary); font-style:italic; font-size:13px; border-radius:20px; padding:8px 16px; }
    .msg-avatar { width:34px; height:34px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; flex-shrink:0; align-self:flex-end; }
    .msg-wrapper.own .msg-avatar { display:none; }
    .msg-sender { font-size:11px; color:var(--text-secondary); font-weight:600; padding:0 4px; }
    .msg-wrapper.own .msg-sender { text-align:right; color:#c4b8ff; }
    .msg-bubble { padding:10px 16px; font-size:15px; line-height:1.45; word-break:break-word; }
    .msg-time { font-size:10px; color:var(--text-secondary); padding:0 4px; opacity:0.8; }
    .typing-indicator { padding:6px 20px; font-size:12px; color:var(--text-secondary); font-style:italic; min-height:24px; }
    .input-area { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }
    .input-area input { flex:1; padding:12px 18px; border-radius:28px; border:2px solid var(--border); background:var(--surface2); color:var(--text); font-size:15px; outline:none; }
    .input-area input:focus { border-color:var(--primary); }
    .btn-send { width:46px; height:46px; border-radius:50%; border:none; background:var(--primary); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
    .btn-send:hover { background:var(--primary-light); }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div class="auth-screen" id="authScreen">
    <div class="logo">💬</div>
    <h1>FreeChat Pro</h1>
    <p class="subtitle">Permanent account · Private messaging</p>
    <input type="text" id="authUsername" placeholder="Username" maxlength="20" autocomplete="off">
    <input type="password" id="authPassword" placeholder="Password" maxlength="30">
    <div class="btn-group">
      <button class="auth-btn btn-login" id="btnLogin">Login</button>
      <button class="auth-btn btn-register" id="btnRegister">Register</button>
    </div>
    <p class="auth-error" id="authError"></p>
  </div>

  <!-- CHAT SCREEN -->
  <div class="chat-container" id="chatContainer" style="display:none;">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">
        <h4>🔍 Search User</h4>
        <div style="display:flex; gap:6px;">
          <input type="text" class="search-box" id="searchUserInput" placeholder="Enter username...">
          <button class="btn-search" id="btnSearchUser" style="width:auto;">Chat</button>
        </div>
      </div>
      <div class="sidebar-section">
        <h4>🟢 Online Now</h4>
        <ul class="online-list" id="onlineList"></ul>
      </div>
      <div class="sidebar-section" style="flex:1;">
        <h4>💬 Your Private Chats</h4>
        <ul class="private-chat-list" id="privateChatList"></ul>
      </div>
      <div class="sidebar-section">
        <button class="btn-leave" id="btnLogout" style="width:100%;">Logout</button>
      </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="main-chat">
      <div class="chat-header">
        <h3 id="chatTitle">🌐 Global Chat</h3>
        <button class="btn-leave" id="btnLeaveChat" style="display:none;">← Global</button>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="typing-indicator" id="typingIndicator"></div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Message..." maxlength="500" autocomplete="off">
        <button class="btn-send" id="btnSend">➤</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    (function() {
      // ========== YOUR FIREBASE CONFIG ==========
      const firebaseConfig = {
        apiKey: "AIzaSyBgqz-yYPi1vLxuPpffkat44YhHhLe2Hsw",
        authDomain: "freechat-vishal.firebaseapp.com",
        databaseURL: "https://freechat-vishal-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "freechat-vishal",
        storageBucket: "freechat-vishal.firebasestorage.app",
        messagingSenderId: "40822804794",
        appId: "1:40822804794:web:ad1cb9046aa20b1a658003"
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      const auth = firebase.auth();

      // DOM elements
      const authScreen = document.getElementById('authScreen');
      const chatContainer = document.getElementById('chatContainer');
      const authUsername = document.getElementById('authUsername');
      const authPassword = document.getElementById('authPassword');
      const btnLogin = document.getElementById('btnLogin');
      const btnRegister = document.getElementById('btnRegister');
      const authError = document.getElementById('authError');
      const onlineList = document.getElementById('onlineList');
      const privateChatList = document.getElementById('privateChatList');
      const messagesArea = document.getElementById('messagesArea');
      const typingIndicator = document.getElementById('typingIndicator');
      const messageInput = document.getElementById('messageInput');
      const btnSend = document.getElementById('btnSend');
      const btnLogout = document.getElementById('btnLogout');
      const chatTitle = document.getElementById('chatTitle');
      const btnLeaveChat = document.getElementById('btnLeaveChat');
      const searchUserInput = document.getElementById('searchUserInput');
      const btnSearchUser = document.getElementById('btnSearchUser');

      // State
      let myUsername = '';
      let currentChatId = 'global';
      let currentChatPartner = null;
      let presenceRef = null;
      let typingRef = null;
      let unsubscribes = [];

      // Helpers
      async function sha256(msg) {
        const buffer = new TextEncoder().encode(msg);
        const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
      }
      function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
      function formatTime(ts) { return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
      function clearMessages() { messagesArea.innerHTML = ''; }

      function renderMessage(data) {
        const { username, message, timestamp } = data;
        const isOwn = (username === myUsername);
        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper';
        if (username === 'SYSTEM') wrapper.classList.add('system');
        else wrapper.classList.add(isOwn ? 'own' : 'other');

        if (username === 'SYSTEM') {
          const bubble = document.createElement('div'); bubble.className='msg-bubble'; bubble.textContent=message;
          wrapper.appendChild(bubble);
        } else {
          const avatar = document.createElement('div'); avatar.className='msg-avatar';
          avatar.textContent = username.charAt(0).toUpperCase();
          const content = document.createElement('div'); content.className='msg-content';
          const sender = document.createElement('span'); sender.className='msg-sender';
          sender.textContent = isOwn ? 'You' : username;
          const bubble = document.createElement('div'); bubble.className='msg-bubble'; bubble.textContent=message;
          const time = document.createElement('span'); time.className='msg-time'; time.textContent=formatTime(timestamp);
          content.appendChild(sender); content.appendChild(bubble); content.appendChild(time);
          wrapper.appendChild(avatar); wrapper.appendChild(content);
        }
        messagesArea.appendChild(wrapper);
        scrollToBottom();
      }

      function renderOnlineUsers(usersObj) {
        onlineList.innerHTML = '';
        const users = Object.values(usersObj || {}).filter(u => u && u.username && u.username !== myUsername);
        if (users.length === 0) {
          onlineList.innerHTML = '<li style="color:var(--text-secondary); justify-content:center;">No one else online</li>';
          return;
        }
        users.forEach(u => {
          const li = document.createElement('li');
          li.style.cursor = 'default'; // not clickable
          li.innerHTML = `<div class="avatar">${u.username.charAt(0).toUpperCase()}</div>
                          <span>${u.username}</span><div class="status-dot"></div>`;
          onlineList.appendChild(li);
        });
      }

      function renderPrivateChats(chatMap) {
        privateChatList.innerHTML = '';
        if (!chatMap || Object.keys(chatMap).length === 0) {
          privateChatList.innerHTML = '<li style="color:var(--text-secondary); justify-content:center;">No private chats yet</li>';
          return;
        }
        Object.entries(chatMap).forEach(([roomId, data]) => {
          const li = document.createElement('li');
          li.className = currentChatId === roomId ? 'active' : '';
          li.innerHTML = `<div class="avatar">${data.partner.charAt(0).toUpperCase()}</div><span>${data.partner}</span>`;
          li.addEventListener('click', () => openPrivateChat(roomId, data.partner));
          privateChatList.appendChild(li);
        });
      }

      // Listeners
      function attachGlobalListeners() {
        unsubscribes.forEach(fn => fn());
        unsubscribes = [];
        const msgRef = db.ref('globalMessages').limitToLast(200);
        const unsub1 = msgRef.on('child_added', snap => {
          if (currentChatId === 'global') renderMessage(snap.val());
        });
        unsubscribes.push(() => db.ref('globalMessages').off('child_added', unsub1));
        const presenceRefRoot = db.ref('presence');
        const unsub2 = presenceRefRoot.on('value', snap => renderOnlineUsers(snap.val()));
        unsubscribes.push(() => db.ref('presence').off('value', unsub2));
        const typingRoot = db.ref('typing');
        const unsub3 = typingRoot.on('value', snap => {
          if (currentChatId !== 'global') return;
          const typings = snap.val() || {};
          for (let uid in typings) {
            if (typings[uid] && typings[uid].username !== myUsername) {
              typingIndicator.textContent = typings[uid].username + ' is typing...';
              clearTimeout(window._typingClear);
              window._typingClear = setTimeout(() => typingIndicator.textContent='', 2000);
              break;
            }
          }
        });
        unsubscribes.push(() => db.ref('typing').off('value', unsub3));
        const pvtRef = db.ref('userPrivateChats/' + myUsername);
        const unsub4 = pvtRef.on('value', snap => {
          const data = snap.val() || {};
          const list = {};
          Object.keys(data).forEach(roomId => {
            const parts = roomId.replace('chat_','').split('_');
            const partner = parts.find(p => p !== myUsername);
            if (partner) list[roomId] = { partner };
          });
          renderPrivateChats(list);
        });
        unsubscribes.push(() => db.ref('userPrivateChats/' + myUsername).off('value', unsub4));
      }

      function attachPrivateChatListeners(roomId) {
        unsubscribes.forEach(fn => fn());
        unsubscribes = [];
        const msgRef = db.ref('privateChats/' + roomId + '/messages').limitToLast(200);
        const unsub1 = msgRef.on('child_added', snap => {
          if (currentChatId === roomId) renderMessage(snap.val());
        });
        unsubscribes.push(() => db.ref('privateChats/' + roomId + '/messages').off('child_added', unsub1));
        const typingRefPvt = db.ref('privateTyping/' + roomId);
        const unsub2 = typingRefPvt.on('value', snap => {
          const typings = snap.val() || {};
          for (let uid in typings) {
            if (typings[uid] && typings[uid].username !== myUsername) {
              typingIndicator.textContent = typings[uid].username + ' is typing...';
              clearTimeout(window._typingClear);
              window._typingClear = setTimeout(() => typingIndicator.textContent='', 2000);
              break;
            }
          }
        });
        unsubscribes.push(() => db.ref('privateTyping/' + roomId).off('value', unsub2));
      }

      // Auth
      async function login(username, password) {
        const snap = await db.ref('users/' + username).once('value');
        if (!snap.exists()) throw new Error('Username not found.');
        const hash = await sha256(password);
        if (hash !== snap.val().passwordHash) throw new Error('Incorrect password.');
        return true;
      }
      async function register(username, password) {
        const snap = await db.ref('users/' + username).once('value');
        if (snap.exists()) throw new Error('Username already taken.');
        const hash = await sha256(password);
        await db.ref('users/' + username).set({ passwordHash: hash, createdAt: firebase.database.ServerValue.TIMESTAMP });
        return true;
      }

      async function doAuth(isRegister) {
        const username = authUsername.value.trim();
        const password = authPassword.value.trim();
        authError.textContent = '';
        if (!username || !password) { authError.textContent='Please fill all fields.'; return; }
        if (username.length<2 || username.length>20 || password.length<4) { authError.textContent='Username 2-20 chars, password min 4 chars.'; return; }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) { authError.textContent='Only letters, numbers, underscores.'; return; }
        try {
          await auth.signInAnonymously();
        } catch(e){}
        try {
          if (isRegister) await register(username, password);
          else await login(username, password);
          myUsername = username;
          const uid = auth.currentUser.uid;
          presenceRef = db.ref('presence/' + uid);
          await presenceRef.set({ username: myUsername, onlineAt: firebase.database.ServerValue.TIMESTAMP });
          presenceRef.onDisconnect().remove();
          typingRef = db.ref('typing/' + uid);
          typingRef.onDisconnect().remove();
          db.ref('globalMessages').push({
            username: 'SYSTEM', message: `${myUsername} joined`, timestamp: Date.now(), uid: 'system'
          });
          authScreen.style.display = 'none';
          chatContainer.style.display = 'flex';
          currentChatId = 'global';
          chatTitle.textContent = '🌐 Global Chat';
          btnLeaveChat.style.display = 'none';
          clearMessages();
          attachGlobalListeners();
          messageInput.focus();
        } catch(err) {
          authError.textContent = err.message;
          auth.signOut();
        }
      }

      // Logout
      async function logout() {
        if (presenceRef) presenceRef.remove();
        if (typingRef) typingRef.remove();
        unsubscribes.forEach(fn => fn());
        await auth.signOut();
        myUsername = ''; currentChatId='global';
        authScreen.style.display='block'; chatContainer.style.display='none';
        authUsername.value=''; authPassword.value=''; authError.textContent='';
      }

      // Messaging
      function sendMessage() {
        const msg = messageInput.value.trim();
        if (!msg || !myUsername) return;
        const data = { username: myUsername, message: msg, timestamp: Date.now() };
        if (currentChatId === 'global') {
          db.ref('globalMessages').push(data);
        } else {
          db.ref('privateChats/' + currentChatId + '/messages').push(data);
          db.ref('userPrivateChats/' + myUsername + '/' + currentChatId).set(true);
          db.ref('userPrivateChats/' + currentChatPartner + '/' + currentChatId).set(true);
        }
        messageInput.value = ''; messageInput.focus();
      }
      function sendTypingStatus() {
        if (!myUsername) return;
        const uid = auth.currentUser?.uid;
        if (!uid) return;
        if (currentChatId === 'global') {
          db.ref('typing/' + uid).set({ username: myUsername, timestamp: Date.now() });
          clearTimeout(window._typingSend);
          window._typingSend = setTimeout(() => db.ref('typing/' + uid).remove(), 1500);
        } else {
          db.ref('privateTyping/' + currentChatId + '/' + uid).set({ username: myUsername, timestamp: Date.now() });
          clearTimeout(window._typingSend);
          window._typingSend = setTimeout(() => db.ref('privateTyping/' + currentChatId + '/' + uid).remove(), 1500);
        }
      }

      // Private chat actions
      function openPrivateChat(roomId, partner) {
        currentChatId = roomId;
        currentChatPartner = partner;
        chatTitle.textContent = `💬 ${partner}`;
        btnLeaveChat.style.display = 'block';
        clearMessages();
        attachPrivateChatListeners(roomId);
      }
      function startPrivateChat(username) {
        if (username === myUsername) return;
        const users = [myUsername, username].sort();
        const roomId = 'chat_' + users[0] + '_' + users[1];
        db.ref('privateChats/' + roomId + '/participants').set({ user1: users[0], user2: users[1] });
        db.ref('userPrivateChats/' + myUsername + '/' + roomId).set(true);
        db.ref('userPrivateChats/' + username + '/' + roomId).set(true);
        openPrivateChat(roomId, username);
      }
      function leavePrivateChat() {
        currentChatId = 'global';
        currentChatPartner = null;
        chatTitle.textContent = '🌐 Global Chat';
        btnLeaveChat.style.display = 'none';
        clearMessages();
        attachGlobalListeners();
      }

      // Event listeners
      btnLogin.addEventListener('click', ()=> doAuth(false));
      btnRegister.addEventListener('click', ()=> doAuth(true));
      authPassword.addEventListener('keydown', e=> { if(e.key==='Enter') doAuth(false); });
      btnSend.addEventListener('click', sendMessage);
      messageInput.addEventListener('keydown', e=> { if(e.key==='Enter'){ e.preventDefault(); sendMessage(); } });
      messageInput.addEventListener('input', ()=> { if(messageInput.value.trim()) sendTypingStatus(); });
      btnLogout.addEventListener('click', logout);
      btnLeaveChat.addEventListener('click', leavePrivateChat);
      btnSearchUser.addEventListener('click', ()=>{
        const username = searchUserInput.value.trim();
        if (username) { startPrivateChat(username); searchUserInput.value=''; }
      });
      searchUserInput.addEventListener('keydown', e=> {
        if (e.key==='Enter') { btnSearchUser.click(); }
      });

      authUsername.focus();
    })();
  </script>
</body>
</html>
