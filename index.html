<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeChat – Firebase</title>
    <style>
        :root {
            --bg: #0f0f14;
            --surface: #1a1a24;
            --surface2: #222230;
            --primary: #6c5ce7;
            --primary-glow: #8b7cf0;
            --text: #e0e0e8;
            --text-secondary: #9898aa;
            --border: #2a2a3a;
            --msg-own: #6c5ce7;
            --msg-other: #2a2a3c;
            --success: #00c9a7;
            --danger: #ff6b6b;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .join-screen, .chat-container {
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .join-screen {
            background: var(--surface);
            border-radius: 20px;
            padding: 48px 36px;
            width: 420px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        .join-screen .logo { font-size: 56px; margin-bottom: 8px; }
        .join-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .join-screen .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 28px; }
        .join-screen input {
            width: 100%; padding: 14px 18px; border-radius: var(--radius-sm);
            border: 2px solid var(--border); background: var(--surface2); color: var(--text);
            font-size: 16px; outline: none; text-align: center; letter-spacing: 0.3px;
            transition: var(--transition);
        }
        .join-screen input:focus { border-color: var(--primary); }
        .btn-join {
            width: 100%; padding: 14px; margin-top: 16px; border-radius: var(--radius-sm);
            border: none; background: var(--primary); color: #fff; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .btn-join:active { transform: scale(0.97); }
        .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; min-height: 18px; }
        .chat-container {
            display: flex; flex-direction: row; width: 100vw; height: 100vh;
            max-width: 1100px; max-height: 95vh; background: var(--surface);
            border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        @media (max-width: 700px) {
            .chat-container { max-width: 100vw; max-height: 100vh; border-radius: 0; flex-direction: column; }
        }
        .sidebar {
            width: 260px; background: var(--surface2); display: flex; flex-direction: column;
            border-right: 1px solid var(--border); flex-shrink: 0;
        }
        @media (max-width: 700px) {
            .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 10px 16px; border-right: none; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        }
        .sidebar-header {
            padding: 20px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-header .dot {
            width: 10px; height: 10px; border-radius: 50%; background: var(--success);
        }
        .online-list {
            flex: 1; overflow-y: auto; padding: 10px 12px; list-style: none;
            display: flex; flex-direction: column; gap: 4px;
        }
        @media (max-width: 700px) {
            .online-list { flex-direction: row; overflow-x: auto; padding: 0; gap: 6px; }
        }
        .online-list li {
            padding: 10px 14px; border-radius: var(--radius-sm); display: flex;
            align-items: center; gap: 10px; font-size: 14px; cursor: default;
        }
        .online-list li .avatar {
            width: 34px; height: 34px; border-radius: 50%; background: var(--primary);
            display: flex; align-items: center; justify-content: center; font-weight: 700;
            color: #fff; flex-shrink: 0;
        }
        .online-list li.you { background: rgba(108,92,231,0.15); }
        .online-count { font-size: 12px; color: var(--text-secondary); padding: 4px 12px 10px; }
        .main-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .btn-leave {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            font-size: 13px; transition: var(--transition);
        }
        .btn-leave:hover { background: rgba(255,107,107,0.15); border-color: var(--danger); color: var(--danger); }
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex;
            flex-direction: column; gap: 8px;
        }
        .msg-wrapper { display: flex; gap: 10px; max-width: 75%; animation: msgIn 0.3s ease; }
        .msg-wrapper.own { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.own .msg-bubble { background: var(--msg-own); border-radius: 18px 18px 4px 18px; color:#fff; }
        .msg-wrapper.other .msg-bubble { background: var(--msg-other); border-radius: 18px 18px 18px 4px; }
        .msg-wrapper.system { align-self: center; max-width: 90%; }
        .msg-wrapper.system .msg-bubble { background: transparent; border: 1px dashed var(--border); color: var(--text-secondary); font-style: italic; font-size: 13px; border-radius: 20px; padding: 8px 16px; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; color:#fff; flex-shrink: 0; align-self: flex-end; }
        .msg-wrapper.own .msg-avatar { display: none; }
        .msg-wrapper.system .msg-avatar { display: none; }
        .msg-sender { font-size: 11px; color: var(--text-secondary); font-weight: 600; padding:0 4px; }
        .msg-wrapper.own .msg-sender { text-align: right; color: #c4b8ff; }
        .msg-bubble { padding: 10px 16px; font-size: 15px; line-height: 1.45; word-break: break-word; }
        .msg-time { font-size: 10px; color: var(--text-secondary); padding:0 4px; opacity:0.8; }
        .typing-indicator { padding: 6px 20px; font-size: 12px; color: var(--text-secondary); font-style: italic; min-height: 24px; }
        .input-area { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap:10px; align-items: center; }
        .input-area input { flex:1; padding:12px 18px; border-radius:28px; border:2px solid var(--border); background:var(--surface2); color:var(--text); font-size:15px; outline:none; }
        .input-area input:focus { border-color: var(--primary); }
        .btn-send { width:46px; height:46px; border-radius:50%; border:none; background:var(--primary); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .btn-send:active { transform:scale(0.9); }
    </style>
</head>
<body>

    <!-- JOIN SCREEN -->
    <div class="join-screen" id="joinScreen">
        <div class="logo">💬</div>
        <h1>FreeChat</h1>
        <p class="subtitle">Real‑time via Firebase (free)</p>
        <input type="text" id="usernameInput" placeholder="Choose a username..." maxlength="20" autocomplete="off">
        <button class="btn-join" id="btnJoin">Join Chat</button>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <!-- CHAT SCREEN (hidden initially) -->
    <div class="chat-container" id="chatContainer" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="dot"></div>
                <span>Online Now</span>
            </div>
            <p class="online-count" id="onlineCount">0 users</p>
            <ul class="online-list" id="onlineList"></ul>
        </div>
        <div class="main-chat">
            <div class="chat-header">
                <h3>💬 FreeChat</h3>
                <button class="btn-leave" id="btnLeave">Leave</button>
            </div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
                <button class="btn-send" id="btnSend">➤</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        (function() {
            // ========== YOUR FIREBASE CONFIG (already fixed) ==========
            const firebaseConfig = {
                apiKey: "AIzaSyBgqz-yYPi1vLxuPpffkat44YhHhLe2Hsw",
                authDomain: "freechat-vishal.firebaseapp.com",
                databaseURL: "https://freechat-vishal-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "freechat-vishal",
                storageBucket: "freechat-vishal.firebasestorage.app",
                messagingSenderId: "40822804794",
                appId: "1:40822804794:web:ad1cb9046aa20b1a658003"
            };

            // Initialize Firebase
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            const auth = firebase.auth();

            // ========== DOM ELEMENTS ==========
            const joinScreen = document.getElementById('joinScreen');
            const chatContainer = document.getElementById('chatContainer');
            const usernameInput = document.getElementById('usernameInput');
            const btnJoin = document.getElementById('btnJoin');
            const errorMsg = document.getElementById('errorMsg');
            const onlineList = document.getElementById('onlineList');
            const onlineCount = document.getElementById('onlineCount');
            const messagesArea = document.getElementById('messagesArea');
            const typingIndicator = document.getElementById('typingIndicator');
            const messageInput = document.getElementById('messageInput');
            const btnSend = document.getElementById('btnSend');
            const btnLeave = document.getElementById('btnLeave');

            // ========== STATE ==========
            let myUsername = '';
            let myUid = null;
            let presenceRef = null;
            let typingRef = null;
            let unsubscribeMessages = null;
            let unsubscribePresence = null;
            let unsubscribeTyping = null;

            // ========== FUNCTIONS ==========
            function scrollToBottom() {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            function formatTime(ts) {
                const d = new Date(ts);
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            function renderMessage(data) {
                const { username, message, timestamp, uid } = data;
                const isOwn = (uid === myUid);
                const wrapper = document.createElement('div');
                wrapper.classList.add('msg-wrapper');
                if (username === 'SYSTEM') {
                    wrapper.classList.add('system');
                } else {
                    wrapper.classList.add(isOwn ? 'own' : 'other');
                }

                if (username === 'SYSTEM') {
                    const bubble = document.createElement('div');
                    bubble.classList.add('msg-bubble');
                    bubble.textContent = message;
                    wrapper.appendChild(bubble);
                } else {
                    const avatar = document.createElement('div');
                    avatar.classList.add('msg-avatar');
                    avatar.textContent = (username || '?').charAt(0).toUpperCase();

                    const content = document.createElement('div');
                    content.classList.add('msg-content');

                    const sender = document.createElement('span');
                    sender.classList.add('msg-sender');
                    sender.textContent = isOwn ? 'You' : username;

                    const bubble = document.createElement('div');
                    bubble.classList.add('msg-bubble');
                    bubble.textContent = message;

                    const time = document.createElement('span');
                    time.classList.add('msg-time');
                    time.textContent = formatTime(timestamp);

                    content.appendChild(sender);
                    content.appendChild(bubble);
                    content.appendChild(time);
                    wrapper.appendChild(avatar);
                    wrapper.appendChild(content);
                }
                messagesArea.appendChild(wrapper);
                scrollToBottom();
            }

            function renderOnlineUsers(usersObj) {
                onlineList.innerHTML = '';
                const users = Object.values(usersObj || {}).filter(u => u && u.username);
                const uniqueUsernames = [...new Set(users.map(u => u.username))];
                onlineCount.textContent = uniqueUsernames.length + ' user' + (uniqueUsernames.length !== 1 ? 's' : '');

                uniqueUsernames.forEach(name => {
                    const li = document.createElement('li');
                    if (name === myUsername) li.classList.add('you');

                    const avatar = document.createElement('div');
                    avatar.classList.add('avatar');
                    avatar.textContent = name.charAt(0).toUpperCase();

                    const dot = document.createElement('div');
                    dot.style.width = '8px';
                    dot.style.height = '8px';
                    dot.style.borderRadius = '50%';
                    dot.style.background = 'var(--success)';

                    const span = document.createElement('span');
                    span.textContent = name + (name === myUsername ? ' (you)' : '');

                    li.appendChild(avatar);
                    li.appendChild(dot);
                    li.appendChild(span);
                    onlineList.appendChild(li);
                });
            }

            function showTyping(username) {
                typingIndicator.textContent = username + ' is typing...';
                clearTimeout(window._typingClear);
                window._typingClear = setTimeout(() => {
                    typingIndicator.textContent = '';
                }, 2000);
            }

            // ========== FIREBASE LISTENERS ==========
            function attachListeners() {
                // Messages listener (last 200)
                const messagesRef = db.ref('messages').limitToLast(200);
                unsubscribeMessages = messagesRef.on('child_added', snapshot => {
                    const msg = snapshot.val();
                    if (msg) renderMessage(msg);
                });

                // Presence listener
                const presenceRoot = db.ref('presence');
                unsubscribePresence = presenceRoot.on('value', snapshot => {
                    const users = snapshot.val() || {};
                    renderOnlineUsers(users);
                });

                // Typing listener
                const typingRoot = db.ref('typing');
                unsubscribeTyping = typingRoot.on('value', snapshot => {
                    const typings = snapshot.val() || {};
                    // Show first non-me user typing
                    for (let uid in typings) {
                        if (uid !== myUid && typings[uid] && typings[uid].username) {
                            showTyping(typings[uid].username);
                            break;
                        }
                    }
                });
            }

            function detachListeners() {
                if (unsubscribeMessages) db.ref('messages').off('child_added', unsubscribeMessages);
                if (unsubscribePresence) db.ref('presence').off('value', unsubscribePresence);
                if (unsubscribeTyping) db.ref('typing').off('value', unsubscribeTyping);
            }

            // ========== JOIN / LEAVE ==========
            async function joinChat() {
                const username = usernameInput.value.trim();
                if (!username) {
                    errorMsg.textContent = 'Please enter a username.';
                    return;
                }
                if (username.length < 2 || username.length > 20) {
                    errorMsg.textContent = 'Username must be 2–20 characters.';
                    return;
                }
                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    errorMsg.textContent = 'Only letters, numbers, underscores.';
                    return;
                }

                errorMsg.textContent = '';
                btnJoin.disabled = true;
                btnJoin.textContent = 'Connecting...';

                try {
                    // Sign in anonymously
                    const userCredential = await auth.signInAnonymously();
                    myUid = userCredential.user.uid;
                    myUsername = username;

                    // Create presence node (auto-remove on disconnect)
                    presenceRef = db.ref('presence/' + myUid);
                    await presenceRef.set({
                        username: myUsername,
                        joinedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    presenceRef.onDisconnect().remove();

                    // Typing node (clean on disconnect)
                    typingRef = db.ref('typing/' + myUid);
                    typingRef.onDisconnect().remove();

                    // Add system message
                    db.ref('messages').push({
                        username: 'SYSTEM',
                        message: `${myUsername} joined the chat`,
                        timestamp: Date.now(),
                        uid: 'system'
                    });

                    // Switch UI
                    joinScreen.style.display = 'none';
                    chatContainer.style.display = 'flex';
                    messageInput.focus();

                    // Attach listeners
                    attachListeners();
                } catch (err) {
                    console.error(err);
                    errorMsg.textContent = 'Failed to connect. Please refresh and try again.';
                } finally {
                    btnJoin.disabled = false;
                    btnJoin.textContent = 'Join Chat';
                }
            }

            async function leaveChat() {
                if (presenceRef) await presenceRef.remove();
                if (typingRef) await typingRef.remove();
                detachListeners();
                await auth.signOut();

                myUid = null;
                myUsername = '';
                messagesArea.innerHTML = '';
                typingIndicator.textContent = '';
                onlineList.innerHTML = '';
                onlineCount.textContent = '0 users';
                chatContainer.style.display = 'none';
                joinScreen.style.display = 'block';
                usernameInput.value = '';
                errorMsg.textContent = '';
                usernameInput.focus();
            }

            // ========== SEND MESSAGE ==========
            function sendMessage() {
                const msg = messageInput.value.trim();
                if (!msg || !myUid) return;
                db.ref('messages').push({
                    username: myUsername,
                    message: msg,
                    timestamp: Date.now(),
                    uid: myUid
                });
                messageInput.value = '';
                messageInput.focus();
            }

            // ========== TYPING INDICATOR ==========
            function sendTypingStatus() {
                if (!typingRef || !myUid) return;
                typingRef.set({
                    username: myUsername,
                    timestamp: Date.now()
                });
                clearTimeout(window._typingSendClear);
                window._typingSendClear = setTimeout(() => {
                    typingRef.remove();
                }, 1500);
            }

            // ========== EVENT LISTENERS ==========
            btnJoin.addEventListener('click', joinChat);
            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') joinChat();
            });
            btnSend.addEventListener('click', sendMessage);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            });
            messageInput.addEventListener('input', () => {
                if (messageInput.value.trim()) sendTypingStatus();
            });
            btnLeave.addEventListener('click', leaveChat);

            // Handle page unload
            window.addEventListener('beforeunload', () => {
                if (presenceRef) presenceRef.remove();
                if (typingRef) typingRef.remove();
            });

            // Focus on load
            usernameInput.focus();
        })();
    </script>
</body>
</html>
